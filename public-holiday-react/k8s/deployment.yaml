apiVersion: apps/v1
kind: Deployment
metadata:
  name: holiday-frontend
  labels:
    app: holiday-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: holiday-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: holiday-frontend
    spec:
      containers:
        - name: frontend
          image: public-holiday-react:latest
          # Never pull from a registry — use the locally built image (Docker Desktop kind)
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          # Mount the nginx config from ConfigMap so the API upstream can be changed
          # without rebuilding the image.
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: nginx-config
          configMap:
            name: holiday-frontend-nginx
